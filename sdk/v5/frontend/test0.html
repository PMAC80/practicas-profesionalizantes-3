<script>
async function RPCWebAPIFetch(name, content)
{
    const response = await fetch(`http://127.0.0.1:3000/${name}`,
    {
        method: "POST",
        headers: 
        {
            "Content-Type": "application/json",
            "x-user-id": "admin",
            "x-api-key": "1234"
        },
        body: JSON.stringify(content)
    });

    if (response.status === 200)
    {
        return await response.json();
    }
    else if (response.status === 401)
    {
        throw new Error("Unauthorized");
    }
    else
    {
        const errorData = await response.json();
        throw new Error(errorData.exception || "Error desconocido");
    }
}

async function onBtnPrintOnClick()
{
    try 
    {
        console.log("CLICK PRINT");
        const result = await RPCWebAPIFetch("print", {});
        console.log("RESPUESTA PRINT:", result);
    }
    catch (error)
    {
        console.error("ERROR:", error.message);
    }
}
