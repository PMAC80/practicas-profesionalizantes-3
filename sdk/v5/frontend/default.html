// =====================================================================
// PUNTO 1: RPCWebAPIFetch (Encapsulamiento de peticiones)
// =====================================================================
async function RPCWebAPIFetch(name, content)
{
    const userId = sessionStorage.getItem('x-user-id') || '';
    const apiKey = sessionStorage.getItem('x-api-key') || '';

    const response = await fetch(`http://127.0.0.1:3000/${name}`,
    {
        method: "POST",
        headers: 
        {
            "Content-Type": "application/json",
            "x-user-id": userId,
            "x-api-key": apiKey
        },
        body: JSON.stringify(content)
    });

    if (response.status === 200)
    {
        return await response.json();
    }
    else if (response.status === 401)
    {
        // Consigna Punto 4: Si es 401, vaciar credenciales y mostrar login
        sessionStorage.removeItem('x-user-id');
        sessionStorage.removeItem('x-api-key');
        showLoginScreen(); 
        throw new Error("Unauthorized");
    }
    else
    {
        const errorData = await response.json();
        throw new Error(errorData.exception || "Error en la petición");
    }
}


// =====================================================================
// PUNTO 2: WEBCOMPONENT - WCLoginFormView
// =====================================================================
class WCLoginFormView extends HTMLElement
{
    constructor() { super(); }

    connectedCallback()
    {
        this.appendChild(this.createForm());
        
        // Referencias a los inputs
        this.userInput = this.querySelector("#login-user");
        this.passInput = this.querySelector("#login-pass");
        this.btnLogin = this.querySelector("#btn-login");

        this.btnLogin.addEventListener("click", async () => {
            try {
                // Guardamos credenciales temporalmente para la petición
                sessionStorage.setItem('x-user-id', this.userInput.value);
                sessionStorage.setItem('x-api-key', this.passInput.value);
                
                await RPCWebAPIFetch("login", {});
                
                // Si llega acá, el login fue exitoso (200)
                showDashboard();
            } catch (error) {
                console.error(error);
                // Si falla, limpiamos
                sessionStorage.removeItem('x-user-id');
                sessionStorage.removeItem('x-api-key');
                alert("Error de login: " + error.message);
            }
        });
    }

    createForm()
    {
        let container = document.createElement("div");
        container.classList.add("w3-padding-32");
        
        let wrapper = document.createElement("div");
        wrapper.classList.add("w3-auto");
        wrapper.style.width = "380px";
        
        let card = document.createElement("div");
        card.classList.add("w3-white", "w3-round", "w3-margin-bottom", "w3-border");
        
        let padding = document.createElement("div");
        padding.classList.add("w3-padding-large");

        // Header con Logo ISFT 151
        let header = document.createElement("div");
        header.classList.add("w3-center", "w3-padding-16");
        let logo = document.createElement("img");
        logo.src = "./assets/f.jpg"; // Logo institucional pedido en consigna
        logo.classList.add("w3-image");
        logo.style.width = "100px";
        let title = document.createElement("p");
        title.textContent = "INICIAR SESIÓN";
        header.appendChild(logo);
        header.appendChild(title);

        // Inputs
        let divUser = document.createElement("div");
        divUser.classList.add("w3-margin-bottom");
        let inputUser = document.createElement("input");
        inputUser.type = "text";
        inputUser.id = "login-user";
        inputUser.classList.add("w3-input", "w3-round", "w3-border");
        inputUser.placeholder = "Usuario";
        divUser.appendChild(inputUser);

        let divPass = document.createElement("div");
        divPass.classList.add("w3-margin-bottom");
        let inputPass = document.createElement("input");
        inputPass.type = "password";
        inputPass.id = "login-pass";
        inputPass.classList.add("w3-input", "w3-round", "w3-border");
        inputPass.placeholder = "Contraseña";
        divPass.appendChild(inputPass);

        // Botón
        let btn = document.createElement("button");
        btn.type = "button";
        btn.id = "btn-login";
        btn.classList.add("w3-button", "w3-round", "w3-margin-bottom", "w3-primary", "w3-block");
        btn.textContent = "Ingresar";

        // Ensamblado (Sin innerHTML, solo API DOM)
        padding.appendChild(header);
        padding.appendChild(divUser);
        padding.appendChild(divPass);
        padding.appendChild(btn);
        card.appendChild(padding);
        wrapper.appendChild(card);
        container.appendChild(wrapper);

        return container;
    }
}
customElements.define("wc-login-form-view", WCLoginFormView);

// =====================================================================
// PUNTO 4: LAYOUT PRINCIPAL (WCApplicationView simplificado para v5)
// =====================================================================
class WCApplicationView extends HTMLElement
{
    constructor()
    {
        super();
        this.contentDiv = null;
    }

    connectedCallback()
    {
        this.appendChild(this.createLayout());
    }

    getContentDiv() { return this.contentDiv; }

    createLayout()
    {
        let app = document.createElement("div");
        app.id = "app";

        // Checkbox para el sidebar
        let checkbox = document.createElement("input");
        checkbox.id = "sidebar-control";
        checkbox.type = "checkbox";
        checkbox.classList.add("w3-hide");
        app.appendChild(checkbox);

        // Navbar
        app.appendChild(this.createNavbar());
        
        // Sidebar
        app.appendChild(this.createSidebar());
        
        // Content
        let main = document.createElement("div");
        main.classList.add("w3-main");
        main.style.marginTop = "54px";
        
        this.contentDiv = document.createElement("div");
        this.contentDiv.style.padding = "16px 32px";
        main.appendChild(this.contentDiv);
        app.appendChild(main);

        return app;
    }

    createNavbar()
    {
        let navbar = document.createElement("div");
        navbar.classList.add("w3-top", "w3-card");
        navbar.style.height = "54px";
        
        let flexBar = document.createElement("div");
        flexBar.classList.add("w3-flex-bar", "w3-theme", "w3-left-align");

        // Logo ISFT 151 en la navbar
        let logoContainer = document.createElement("div");
        logoContainer.classList.add("w3-bar-item");
        let img = document.createElement("img");
        img.src = "./assets/f.jpg"; // Logo institucional pedido en consigna
        img.style.height = "40px";
        img.style.marginLeft = "10px";
        logoContainer.appendChild(img);
        flexBar.appendChild(logoContainer);

        // Botón hamburguesa
        let menuBtn = document.createElement("label");
        menuBtn.htmlFor = "sidebar-control";
        menuBtn.classList.add("w3-button", "w3-large", "w3-opacity-min");
        let iconMenu = document.createElement("i");
        iconMenu.classList.add("fa", "fa-bars");
        menuBtn.appendChild(iconMenu);
        flexBar.appendChild(menuBtn);

        // Espaciador
        let spacer = document.createElement("div");
        spacer.style.flex = "1";
        flexBar.appendChild(spacer);

        // Botones derecha (Logout pedido en consigna)
        let rightDiv = document.createElement("div");
        rightDiv.classList.add("w3-right");
        
        let btnLogout = document.createElement("button");
        btnLogout.type = "button";
        btnLogout.classList.add("w3-button", "w3-large", "w3-opacity-min");
        btnLogout.title = "Cerrar Sesión";
        let iconLogout = document.createElement("i");
        iconLogout.classList.add("fa", "fa-sign-out");
        btnLogout.appendChild(iconLogout);
        
        // Lógica de Logout (Consigna Punto 4)
        btnLogout.onclick = () => {
            sessionStorage.removeItem('x-user-id');
            sessionStorage.removeItem('x-api-key');
            showLoginScreen();
        };

        rightDiv.appendChild(btnLogout);
        flexBar.appendChild(rightDiv);

        navbar.appendChild(flexBar);
        return navbar;
    }

    createSidebar()
    {
        let nav = document.createElement("nav");
        nav.id = "sidebar";
        nav.classList.add("w3-sidebar", "w3-top", "w3-bottom", "w3-collapse", "w3-white", "w3-border-right", "w3-border-top");
        nav.style.zIndex = "3";
        nav.style.width = "230px";
        nav.style.height = "auto";
        nav.style.marginTop = "54px";

        let menu = document.createElement("div");
        menu.classList.add("w3-bar-block");

        // Título menú
        let title = document.createElement("span");
        title.classList.add("w3-bar-item", "w3-padding", "w3-small", "w3-opacity");
        title.textContent = " MENÚ PRINCIPAL ";
        menu.appendChild(title);

        // Items pedidos en la consigna Punto 4
        menu.appendChild(this.createSidebarItem("fa-users", "Gestión de usuarios y grupos", "#"));
        menu.appendChild(this.createSidebarItem("fa-lock", "Control de accesos", "#"));
        
        // Botón para ir a Registro (para probar el otro WebComponent)
        menu.appendChild(this.createSidebarItem("fa-user-plus", "Ir a Registro", "#register"));

        nav.appendChild(menu);
        return nav;
    }

    createSidebarItem(iconClass, text, href)
    {
        let item = document.createElement("a");
        item.href = href;
        item.classList.add("w3-bar-item", "w3-button", "w3-padding-large");
        
        let icon = document.createElement("i");
        icon.classList.add("fa", "fa-fw", iconClass);
        
        let label = document.createTextNode(" " + text);
        
        item.appendChild(icon);
        item.appendChild(label);
        return item;
    }
}
customElements.define("wc-application-view", WCApplicationView);


// =====================================================================
// LÓGICA DE NAVEGACIÓN (Punto 4: Mostrar Login o Dashboard)
// =====================================================================
let appInstance = null;

function initApp()
{
    appInstance = new WCApplicationView();
    document.body.appendChild(appInstance);
    checkSession();
}

function checkSession()
{
    const userId = sessionStorage.getItem('x-user-id');
    if (userId) {
        showDashboard();
    } else {
        showLoginScreen();
    }
}

function showLoginScreen()
{
    if (!appInstance) return;
    let content = appInstance.getContentDiv();
    content.innerHTML = ""; // Limpiamos el contenido
    
    // Ocultar sidebar si estamos en login (opcional, pero queda mejor)
    document.getElementById("sidebar").style.display = "none";
    
    let loginForm = new WCLoginFormView();
    content.appendChild(loginForm);
}

function showDashboard()
{
    if (!appInstance) return;
    let content = appInstance.getContentDiv();
    content.innerHTML = "";
    
    // Mostrar sidebar
    document.getElementById("sidebar").style.display = "block";

    let h2 = document.createElement("h2");
    h2.textContent = "Bienvenido al Sistema";
    content.appendChild(h2);

    let p = document.createElement("p");
    p.textContent = "Usuario logueado: " + sessionStorage.getItem('x-user-id');
    content.appendChild(p);
    
    // Botón para probar el registro
    let btnReg = document.createElement("button");
    btnReg.className = "w3-button w3-margin-top";
    btnReg.textContent = "Probar Formulario de Registro";
    btnReg.onclick = () => {
        content.innerHTML = "";
        content.appendChild(new WCRegisterFormView());
    };
    content.appendChild(btnReg);
}

window.onload = initApp;

</script>
