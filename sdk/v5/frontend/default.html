// =====================================================================
// PUNTO 1: RPCWebAPIFetch
// =====================================================================
class RPCWebAPIException extends Error
{
    constructor(type, detail)
    {
        super(detail);
        this.name = 'RPCWebAPIException';
        this.type = type;
        this.detail = detail;
    }
}

async function RPCWebAPIFetch(name, content)
{
    const userId = sessionStorage.getItem('x-user-id') || '';
    const apiKey = sessionStorage.getItem('x-api-key') || '';

    const response = await fetch(`http://127.0.0.1:3000/${name}`,
    {
        method: "POST",
        headers: 
        {
            "Content-Type": "application/json",
            "x-user-id": userId,
            "x-api-key": apiKey
        },
        body: JSON.stringify(content)
    });

    switch (response.status)
    {
        case 200:
            return await response.json();
        
        case 400:
            throw new RPCWebAPIException('Bad Request', 'SpecificationError');
        
        case 401:
            sessionStorage.removeItem('x-user-id');
            sessionStorage.removeItem('x-api-key');
            showLoginScreen();
            throw new RPCWebAPIException('Auth Error', 'UnauthorizedError');
        
        case 422:
            throw new RPCWebAPIException('Domain Error', 'DomainError');
        
        case 500:
            throw new RPCWebAPIException('Server Error', 'ProgramError');
        
        default:
            throw new RPCWebAPIException('Unknown Error', 'SpecificationError');
    }
}


// =====================================================================
// PUNTO 2: WEBCOMPONENT - WCLoginFormView
// =====================================================================
class WCLoginFormView extends HTMLElement
{
    constructor()
    {
        super();

        this.container = null;
        this.userInput = null;
        this.passInput = null;
        this.btnLogin = null;

        this.onLoginClick = this.onLoginClick.bind(this);

        // Crear estructura en el constructor
        this.container = this.createForm();
        this.userInput = this.container.querySelector("#login-user");
        this.passInput = this.container.querySelector("#login-pass");
        this.btnLogin = this.container.querySelector("#btn-login");
    }

    connectedCallback()
    {
        // AppendChild en connectedCallback (patrón Seminario)
        this.appendChild(this.container);

        if (this.btnLogin)
        {
            this.btnLogin.addEventListener("click", this.onLoginClick);
        }
    }

    disconnectedCallback()
    {
        if (this.btnLogin)
        {
            this.btnLogin.removeEventListener("click", this.onLoginClick);
        }
    }

    async onLoginClick()
    {
        try {
            sessionStorage.setItem('x-user-id', this.userInput.value);
            sessionStorage.setItem('x-api-key', this.passInput.value);
            
            await RPCWebAPIFetch("login", {});
            showDashboard();
        } catch (error) {
            console.error(error);
            sessionStorage.removeItem('x-user-id');
            sessionStorage.removeItem('x-api-key');
            alert("Error de login: " + error.message);
        }
    }

    createForm()
    {
        let container = document.createElement("div");
        container.classList.add("w3-padding-32");
        
        let wrapper = document.createElement("div");
        wrapper.classList.add("w3-auto");
        wrapper.style.width = "380px";
        
        let card = document.createElement("div");
        card.classList.add("w3-white", "w3-round", "w3-margin-bottom", "w3-border");
        
        let padding = document.createElement("div");
        padding.classList.add("w3-padding-large");

        let header = document.createElement("div");
        header.classList.add("w3-center", "w3-padding-16");
        let logo = document.createElement("img");
        logo.src = "./assets/f.jpg";
        logo.classList.add("w3-image");
        logo.style.width = "100px";
        let title = document.createElement("p");
        title.textContent = "INICIAR SESIÓN";
        header.appendChild(logo);
        header.appendChild(title);

        let divUser = document.createElement("div");
        divUser.classList.add("w3-margin-bottom");
        let inputUser = document.createElement("input");
        inputUser.type = "text";
        inputUser.id = "login-user";
        inputUser.classList.add("w3-input", "w3-round", "w3-border");
        inputUser.placeholder = "Usuario";
        divUser.appendChild(inputUser);

        let divPass = document.createElement("div");
        divPass.classList.add("w3-margin-bottom");
        let inputPass = document.createElement("input");
        inputPass.type = "password";
        inputPass.id = "login-pass";
        inputPass.classList.add("w3-input", "w3-round", "w3-border");
        inputPass.placeholder = "Contraseña";
        divPass.appendChild(inputPass);

        let btn = document.createElement("button");
        btn.type = "button";
        btn.id = "btn-login";
        btn.classList.add("w3-button", "w3-round", "w3-margin-bottom", "w3-primary", "w3-block");
        btn.textContent = "Ingresar";

        padding.appendChild(header);
        padding.appendChild(divUser);
        padding.appendChild(divPass);
        padding.appendChild(btn);
        card.appendChild(padding);
        wrapper.appendChild(card);
        container.appendChild(wrapper);

        return container;
    }
}
customElements.define("wc-login-form-view", WCLoginFormView);

// =====================================================================
// PUNTO 4: WEBCOMPONENT - WCApplicationView (Patrón Seminario)
// =====================================================================
class WCApplicationView extends HTMLElement
{
    constructor()
    {
        super();

        this.application = null;
        this.navbar = null;
        this.sidebar = null;
        this.content = null;
        this.contentDiv = null;
        this.footer = null;

        this.menuButton = null;
        this.btnLogout = null;
        this.endpointButtons = [];

        this.onMenuButtonClick = this.onMenuButtonClick.bind(this);
        this.onLogoutClick = this.onLogoutClick.bind(this);
        this.onEndpointClick = this.onEndpointClick.bind(this);

        // Crear estructura en el constructor
        this.navbar = this.createNavbar();
        this.sidebar = this.createSidebar();
        this.content = this.createContent();
        this.footer = this.createFooter();

        this.application = this.createApplication();
        
        // Obtener referencias
        this.contentDiv = this.content.querySelector(".content-div");
        this.btnLogout = this.navbar.querySelector("#btn-logout");
    }

    connectedCallback()
    {
        // AppendChild en connectedCallback (patrón Seminario)
        this.appendChild(this.application);

        if (this.menuButton)
        {
            this.menuButton.addEventListener("click", this.onMenuButtonClick);
        }

        if (this.btnLogout)
        {
            this.btnLogout.addEventListener("click", this.onLogoutClick);
        }

        // Asignar eventos de endpoints
        this.endpointButtons.forEach(btn => {
            btn.addEventListener("click", this.onEndpointClick);
        });
    }

    disconnectedCallback()
    {
        if (this.menuButton)
        {
            this.menuButton.removeEventListener("click", this.onMenuButtonClick);
        }

        if (this.btnLogout)
        {
            this.btnLogout.removeEventListener("click", this.onLogoutClick);
        }

        this.endpointButtons.forEach(btn => {
            btn.removeEventListener("click", this.onEndpointClick);
        });
    }

    getContentDiv() { return this.contentDiv; }

    clearContent()
    {
        while (this.contentDiv.firstChild)
        {
            this.contentDiv.removeChild(this.contentDiv.firstChild);
        }
    }

    onMenuButtonClick(event)
    {
        console.log("Click en menú hamburguesa");
        
        const sidebar = document.getElementById("sidebar");
        const currentWidth = sidebar.style.width;
        
        if (currentWidth === "0px" || currentWidth === "") {
            sidebar.style.width = "230px";
        } else {
            sidebar.style.width = "0px";
        }
    }   

    onLogoutClick()
    {
        sessionStorage.removeItem('x-user-id');
        sessionStorage.removeItem('x-api-key');
        showLoginScreen();
    }

    onEndpointClick(event)
    {
        event.preventDefault();
        const endpointName = event.currentTarget.dataset.endpoint;
        this.callEndpoint(endpointName);
    }

    async callEndpoint(endpointName)
    {
        try {
            const result = await RPCWebAPIFetch(endpointName, {});
            console.log(`${endpointName}:`, result);
            alert(`${endpointName}: ${JSON.stringify(result)}`);
        } catch (error) {
            console.error("Error:", error.message);
            alert(`Error en ${endpointName}: ${error.message}`);
        }
    }

    createApplication()
    {
        let app = document.createElement("div");
        app.id = "app";

        let checkbox = document.createElement("input");
        checkbox.id = "sidebar-control";
        checkbox.type = "checkbox";
        checkbox.classList.add("w3-hide");

        app.appendChild(checkbox);
        app.appendChild(this.navbar);
        app.appendChild(this.sidebar);
        
        this.content.appendChild(this.footer);
        app.appendChild(this.content);

        return app;
    }

    createNavbar()
    {
        let navbar = document.createElement("div");
        let flexBar = document.createElement("div");

        navbar.classList.add("w3-top", "w3-card");
        navbar.style.height = "54px";
        flexBar.classList.add("w3-flex-bar", "w3-theme", "w3-left-align");

        flexBar.appendChild(this.createLogo());
        flexBar.appendChild(this.createMenuButton());
        flexBar.appendChild(this.createRightButtons());

        navbar.appendChild(flexBar);
        return navbar;
    }

    createSidebar()
    {
        let nav = document.createElement("nav");

        nav.id = "sidebar";
        nav.classList.add("w3-sidebar", "w3-top", "w3-bottom", "w3-collapse", "w3-white", "w3-border-right", "w3-border-top", "scrollbar");
        nav.style.zIndex = "3";
        nav.style.width = "230px";
        nav.style.height = "auto";
        nav.style.marginTop = "54px";
        nav.style.setProperty("border-color", "rgba(0, 0, 0, .1)", "important");

        nav.appendChild(this.createSidebarHeader());
        nav.appendChild(this.createSidebarMenu());

        return nav;
    }

    createContent()
    {
        let main = document.createElement("div");
        let contentDiv = document.createElement("div");

        main.classList.add("w3-main");
        main.style.marginTop = "54px";
        contentDiv.classList.add("content-div");
        contentDiv.style.padding = "16px 32px";

        main.appendChild(contentDiv);
        return main;
    }

    createFooter()
    {
        let footer = document.createElement("footer");
        let spanFooter = document.createElement("span");
        let spanHeart = document.createElement("span");
        let footerLink = document.createElement("a");
        let strongFooter = document.createElement("strong");

        footer.classList.add("w3-padding", "w3-border-top", "w3-center", "w3-white", "w3-margin-top");
        spanFooter.classList.add("w3-opacity");
        spanHeart.classList.add("w3-text-red");
        footerLink.href = "https://w3mix.com";
        footerLink.target = "_blank";
        strongFooter.textContent = "W3Mix.com";

        footerLink.appendChild(strongFooter);
        spanHeart.appendChild(document.createTextNode("♥"));
        spanFooter.appendChild(document.createTextNode("Powered with "));
        spanFooter.appendChild(spanHeart);
        spanFooter.appendChild(document.createTextNode(" by "));
        spanFooter.appendChild(footerLink);
        spanFooter.appendChild(document.createTextNode("."));
        footer.appendChild(spanFooter);

        return footer;
    }

    createTopButton(iconClass)
    {
        let button = document.createElement("button");
        let icon = document.createElement("i");

        button.type = "button";
        button.classList.add("w3-button", "w3-large", "w3-opacity-min");
        icon.classList.add("fa", iconClass);

        button.appendChild(icon);
        return button;
    }

    createSidebarItem(iconClass, text, href)
    {
        let item = document.createElement("a");
        let icon = document.createElement("i");
        let label = document.createTextNode("\u00A0 " + text);

        item.href = href;
        item.classList.add("w3-bar-item", "w3-button", "w3-padding-large", "w3-hover-text-primary");
        
        const iconClasses = iconClass.split(" ");
        icon.classList.add("fa", "fa-fw");
        iconClasses.forEach(cls => icon.classList.add(cls));

        item.appendChild(icon);
        item.appendChild(label);

        return item;
    }

    createLogo()
    {
        let container = document.createElement("div");
        let title = document.createElement("h5");
        let link = document.createElement("a");
        let img = document.createElement("img");

        container.classList.add("admin-logo", "w3-bar-item", "w3-hide-medium", "w3-hide-small");
        title.style.lineHeight = "1";
        title.style.setProperty("margin", "0", "important");
        title.style.fontWeight = "300";
        link.href = "./index.html";
        link.classList.add("w3-button", "w3-bold");
        img.src = "./assets/f.jpg";
        img.alt = "ISFT 151";
        img.classList.add("w3-image");
        img.style.height = "40px";

        link.appendChild(img);
        title.appendChild(link);
        container.appendChild(title);

        return container;
    }

    createMenuButton()
    {
        let label = document.createElement("label");
        let icon = document.createElement("i");

        label.htmlFor = "sidebar-control";
        label.classList.add("w3-button", "w3-large", "w3-opacity-min");
        icon.classList.add("fa", "fa-bars");

        label.appendChild(icon);
        this.menuButton = label;

        return label;
    }

    createRightButtons()
    {
        let container = document.createElement("div");
        container.classList.add("w3-right");

        // Botón de logout
        let btnLogout = document.createElement("button");
        btnLogout.type = "button";
        btnLogout.id = "btn-logout";
        btnLogout.classList.add("w3-button", "w3-large", "w3-opacity-min");
        btnLogout.title = "Cerrar Sesión";
        let iconLogout = document.createElement("i");
        iconLogout.classList.add("fa", "fa-sign-out");
        btnLogout.appendChild(iconLogout);

        container.appendChild(btnLogout);
        return container;
    }

    createSidebarHeader()
    {
        let header = document.createElement("div");
        let label = document.createElement("label");
        let icon = document.createElement("i");
        let title = document.createElement("h5");
        let link = document.createElement("a");
        let img = document.createElement("img");

        header.classList.add("w3-bar-item", "w3-border-bottom", "w3-hide-large");
        header.style.padding = "6px 0";

        label.htmlFor = "sidebar-control";
        label.classList.add("w3-left", "w3-button", "w3-large", "w3-opacity-min");
        label.style.setProperty("background", "white", "important");
        icon.classList.add("fa", "fa-bars");

        title.style.lineHeight = "1";
        title.style.setProperty("margin", "0", "important");
        title.style.fontWeight = "300";
        link.href = "./index.html";
        link.classList.add("w3-button");
        link.style.setProperty("background", "white", "important");
        img.src = "./assets/f.jpg";
        img.alt = "ISFT 151";
        img.classList.add("w3-image");

        label.appendChild(icon);
        link.appendChild(img);
        title.appendChild(link);
        header.appendChild(label);
        header.appendChild(title);

        return header;
    }

    createSidebarMenu()
    {
        let menu = document.createElement("div");
        let navTitle = document.createElement("span");

        menu.classList.add("w3-bar-block");

        navTitle.classList.add("w3-bar-item", "w3-padding", "w3-small", "w3-opacity");
        navTitle.style.marginTop = "8px";
        navTitle.textContent = " MENÚ PRINCIPAL ";

        menu.appendChild(navTitle);
        menu.appendChild(this.createSidebarItem("fa-users", "Gestión de usuarios y grupos", "#"));
        menu.appendChild(this.createSidebarItem("fa-lock", "Control de accesos", "#"));

        // Sección de endpoints
        let endpointsTitle = document.createElement("span");
        endpointsTitle.classList.add("w3-bar-item", "w3-padding", "w3-small", "w3-opacity");
        endpointsTitle.style.marginTop = "16px";
        endpointsTitle.textContent = " ENDPOINTS ";
        menu.appendChild(endpointsTitle);

        // Función auxiliar para crear items de endpoints
        const addEndpoint = (iconClass, text, endpointName) => {
            let item = this.createSidebarItem(iconClass, text, "#");
            item.dataset.endpoint = endpointName;
            this.endpointButtons.push(item);
            menu.appendChild(item);
        };

        addEndpoint("fa-print", "PRINT", "print");
        addEndpoint("fa-file-text-o", "LOG", "log");
        addEndpoint("fa-question-circle", "HELP", "help");
        addEndpoint("fa-smile-o", "SAY HELLO", "sayHello");
        addEndpoint("fa-frown-o", "SAY BYE", "sayBye");

        return menu;
    }
}
customElements.define("wc-application-view", WCApplicationView);


// =====================================================================
// LÓGICA DE NAVEGACIÓN
// =====================================================================
let appInstance = null;

function initApp()
{
    appInstance = new WCApplicationView();
    document.body.appendChild(appInstance);
    checkSession();
}

function checkSession()
{
    const userId = sessionStorage.getItem('x-user-id');
    if (userId) {
        showDashboard();
    } else {
        showLoginScreen();
    }
}

function showLoginScreen()
{
    if (!appInstance) return;
    
    appInstance.clearContent();
    document.getElementById("sidebar").style.display = "none";
    
    let loginForm = new WCLoginFormView();
    appInstance.getContentDiv().appendChild(loginForm);
}

function showDashboard()
{
    if (!appInstance) return;
    
    appInstance.clearContent();
    document.getElementById("sidebar").style.display = "block";

    let h2 = document.createElement("h2");
    h2.textContent = "Bienvenido al Sistema";
    appInstance.getContentDiv().appendChild(h2);

    let p = document.createElement("p");
    p.textContent = "Usuario logueado: " + sessionStorage.getItem('x-user-id');
    appInstance.getContentDiv().appendChild(p);
}

window.onload = initApp;

</script>
