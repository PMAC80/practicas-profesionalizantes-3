<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<title>Prácticas Profesionalizantes III</title>
</head>

<body>

	<h1>Registro de usuarios</h1>

	<form action="http://127.0.0.1:3000/register" method="get">		
		<label>Usuario:</label>
		<input name="username" required>
		<br>

		<label>Password:</label>
		<input type="password" name="password" required>
		<br>

		<button type="submit">Crear usuario</button>
	</form>

	<br>

	<button id="btnMsg">
		Mostrar mensaje en el servidor
	</button>
	
	<button onclick="onBtnLoginTestOnClick()">Login Test</button>
	<hr>

	<h2>Prueba de Endpoints</h2>

	<button id="btnPrint">PRINT</button>
	<button id="btnLog">LOG</button>
	<button id="btnHelp">HELP</button>

	<br><br>

	<button id="btnHello">SAY HELLO</button>
	<button id="btnBye">SAY BYE</button>

</body>

<script>
function onBtnLoginTestOnClick()
{
    fetch("http://127.0.0.1:3000/login",
    {
        method: "POST",
        headers:
        {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(
        {
			username: "prueba2",
			password: "1234"        
		})
    })
    .then(response => response.text())
	.then(data => console.log("RESPUESTA:", data));}

function onBtnMsgOnClick()
{
	console.log("Enviando petición al servidor...");
	fetch("http://127.0.0.1:3000/showMessage");
}

function onBtnPrintOnClick()
{
	console.log("CLICK PRINT");
	fetch("http://127.0.0.1:3000/print");
}

function onBtnLogOnClick()
{
	console.log("CLICK LOG");
	fetch("http://127.0.0.1:3000/log");
}

function onBtnHelpOnClick()
{
	console.log("CLICK help");
	fetch("http://127.0.0.1:3000/help");
}

function onBtnHelloOnClick()
{
	console.log("CLICK sayHello");
	fetch("http://127.0.0.1:3000/sayHello");
}

function onBtnByeOnClick()
{
	console.log("CLICK sayBye");
	fetch("http://127.0.0.1:3000/sayBye");
}

function main()
{
	btnMsg.onclick = onBtnMsgOnClick;
	btnPrint.onclick = onBtnPrintOnClick;
	btnLog.onclick = onBtnLogOnClick;
	btnHelp.onclick = onBtnHelpOnClick;
	btnHello.onclick = onBtnHelloOnClick;
	btnBye.onclick = onBtnByeOnClick;
}


window.onload = main;

</script>

</html>
